<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuki Wang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0ede6;
      --surface:  #ece9e2;
      --border:   #d8d4ca;
      --text:     #1a1a1a;
      --muted:    #6b6860;
      --accent:   #2596be;
      --nav-h:    64px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Playfair Display', 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ── Navigation ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(240, 237, 230, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 5vw, 3rem);
    }

    nav .logo {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      font-family: 'Playfair Display', serif;
      color: var(--text);
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav ul a {
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav ul a.nav-small { font-size: 0.70rem; letter-spacing: 0.1em; }
    nav ul a:hover { color: var(--text); }

    /* ── Sections ── */
    section {
      padding: calc(var(--nav-h) + 5rem) clamp(1.5rem, 5vw, 3rem) 5rem;
      max-width: calc(780px + 6rem);
      margin: 0 auto;
    }

    section:not(:first-of-type) { padding-top: 5rem; }

    /* ── Hero ── */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: calc(var(--nav-h) + 3rem);
      padding-bottom: 3rem;
    }

    #hero h1 {
      font-size: clamp(3.2rem, 8vw, 5.8rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.02em;
      margin-bottom: 2.8rem;
      font-family: 'Playfair Display', serif;
    }

    #hero h1 .line  { display: block; }
    #hero h1 .impact { color: var(--accent); font-style: italic; }

    .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.75rem 1.6rem;
      border-radius: 2px;
      transition: all 0.2s;
      display: inline-block;
      cursor: pointer;
      border: none;
    }

    .btn-primary  { background: var(--text); color: #fff; }
    .btn-primary:hover  { background: var(--accent); }
    .btn-secondary { border: 1px solid var(--border); color: var(--text); background: transparent; }
    .btn-secondary:hover { border-color: var(--muted); }

    /* ── Section label ── */
    .section-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ══════════════════════════════════════
       CONTACT
    ══════════════════════════════════════ */
    #contact { padding-bottom: 8rem; }

    #contact .intro {
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 48ch;
      margin-bottom: 3rem;
      line-height: 1.7;
    }

    .contact-form { max-width: 520px; }
    .form-group   { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 130px; }
    .form-submit { margin-top: 1.8rem; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.8rem clamp(1.5rem, 5vw, 3rem);
      display: flex;
      justify-content: center;
    }

    footer p {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="logo">Yuki Wang</a>
    <ul>
      <li><a href="about.html"   class="nav-small">About Me</a></li>
      <li><a href="projects.html"    class="nav-small">Work</a></li>
      <li><a href="design.html"  class="nav-small">Design Studio</a></li>
      <li><a href="contact.html" class="nav-small">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <section id="hero">
    <h1>
      <span class="line">Research.</span>
      <span class="line">Design.</span>
      <span class="line impact">Impact.</span>
    </h1>
    <div class="btn-group">
      <a href="projects.html" class="btn btn-primary">View My Work</a>
      <a href="contact.html" class="btn btn-secondary">Get in Touch</a>
    </div>
  </section>



  <!-- Footer -->
  <footer>
    <p>© 2026 Yuki Wang. All rights reserved.</p>
  </footer>

</body>
</html>
