<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Studio — Yuki Wang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0ede6;
      --surface:  #ece9e2;
      --border:   #d8d4ca;
      --text:     #1a1a1a;
      --muted:    #6b6860;
      --accent:   #2596be;
      --nav-h:    64px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Playfair Display', 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ── Navigation ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(240, 237, 230, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 5vw, 3rem);
    }

    nav .logo {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      font-family: 'Playfair Display', serif;
      color: var(--text);
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav ul a {
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav ul a.nav-small { font-size: 0.70rem; letter-spacing: 0.1em; }
    nav ul a:hover, nav ul a.active { color: var(--text); }

    /* ── Coming soon centred layout ── */
    .coming-soon {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: calc(var(--nav-h) + 3rem) clamp(1.5rem, 5vw, 3rem) 3rem;
      max-width: calc(780px + 6rem);
      margin: 0 auto;
    }

    .coming-soon .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .coming-soon .eyebrow::after {
      content: '';
      width: 48px;
      height: 1px;
      background: var(--border);
    }

    .coming-soon h1 {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      font-family: 'Playfair Display', serif;
    }

    .coming-soon h1 em {
      color: var(--accent);
      font-style: italic;
    }

    .coming-soon p {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: var(--muted);
      max-width: 42ch;
      line-height: 1.75;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.8rem clamp(1.5rem, 5vw, 3rem);
      display: flex;
      justify-content: center;
    }

    footer p {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Yuki Wang</a>
    <ul>
      <li><a href="about.html"   class="nav-small">About Me</a></li>
      <li><a href="projects.html"    class="nav-small">Work</a></li>
      <li><a href="design.html"  class="nav-small active">Design Studio</a></li>
      <li><a href="contact.html" class="nav-small">Contact</a></li>
    </ul>
  </nav>

  <div class="coming-soon">
    <p class="eyebrow">Design Studio</p>
    <h1>Coming<br><em>Soon.</em></h1>
    <p>Something is being crafted here. Check back shortly.</p>
  </div>

  <footer>
    <p>© 2026 Yuki Wang. All rights reserved.</p>
  </footer>

</body>
</html>
