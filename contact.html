<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Yuki Wang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0ede6;
      --surface:  #ece9e2;
      --border:   #d8d4ca;
      --text:     #1a1a1a;
      --muted:    #6b6860;
      --accent:   #2596be;
      --nav-h:    64px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Playfair Display', 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ── Navigation ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(240, 237, 230, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 5vw, 3rem);
    }

    nav .logo {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      font-family: 'Playfair Display', serif;
      color: var(--text);
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav ul a {
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav ul a.nav-small { font-size: 0.70rem; letter-spacing: 0.1em; }
    nav ul a:hover, nav ul a.active { color: var(--text); }

    /* ── Page wrapper ── */
    .page-content {
      padding: calc(var(--nav-h) + 5rem) clamp(1.5rem, 5vw, 3rem) 8rem;
      max-width: calc(780px + 6rem);
      margin: 0 auto;
    }

    /* ── Section label ── */
    .section-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Intro ── */
    .contact-intro {
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 48ch;
      margin-bottom: 3rem;
      line-height: 1.7;
    }

    /* ── Form ── */
    .contact-form { max-width: 520px; }
    .form-group   { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 130px; }

    .form-submit { margin-top: 1.8rem; }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.75rem 1.6rem;
      border-radius: 2px;
      transition: all 0.2s;
      display: inline-block;
      cursor: pointer;
      border: none;
    }

    .btn-primary { background: var(--text); color: #fff; }
    .btn-primary:hover { background: var(--accent); }
    .btn-primary:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    /* ── Status messages ── */
    .form-status {
      display: none;
      margin-top: 1.4rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 0.9rem 1.1rem;
      border-radius: 2px;
    }

    .form-status.success {
      display: block;
      background: #ddf0e5;
      color: #2a7048;
      border: 1px solid #b8dfc8;
    }

    .form-status.error {
      display: block;
      background: #fdecea;
      color: #a03030;
      border: 1px solid #f0c0bc;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.8rem clamp(1.5rem, 5vw, 3rem);
      display: flex;
      justify-content: center;
    }

    footer p {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Yuki Wang</a>
    <ul>
      <li><a href="about.html"   class="nav-small">About Me</a></li>
      <li><a href="work.html"    class="nav-small">Work</a></li>
      <li><a href="design.html"  class="nav-small">Design Studio</a></li>
      <li><a href="contact.html" class="nav-small active">Contact</a></li>
    </ul>
  </nav>

  <div class="page-content">

    <p class="section-label">Contact</p>
    <p class="contact-intro">Have a project in mind, or just want to say hello? Fill in the form and I'll get back to you.</p>

    <form class="contact-form" id="contactForm">
      <!-- Hidden subject field so Formspree labels the email -->
      <input type="hidden" name="_subject" value="[Portfolio] New message" />

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell me about your project…" required></textarea>
      </div>
      <div class="form-submit">
        <button type="submit" class="btn btn-primary" id="submitBtn">Send Message →</button>
      </div>

      <div class="form-status" id="formStatus"></div>
    </form>

  </div>

  <footer>
    <p>© 2026 Yuki Wang. All rights reserved.</p>
  </footer>

  <script>
    const form       = document.getElementById('contactForm');
    const submitBtn  = document.getElementById('submitBtn');
    const formStatus = document.getElementById('formStatus');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Sending…';
      formStatus.className  = 'form-status';
      formStatus.style.display = 'none';

      const data = new FormData(form);

      try {
        const response = await fetch('https://formspree.io/f/xojpwbnr', {
          method:  'POST',
          body:    data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          formStatus.className     = 'form-status success';
          formStatus.textContent   = '✓ Message sent! I will get back to you soon.';
          form.reset();
          submitBtn.textContent    = 'Send Message →';
          submitBtn.disabled       = false;
        } else {
          const json = await response.json();
          throw new Error(json.error || 'Submission failed');
        }
      } catch (err) {
        formStatus.className   = 'form-status error';
        formStatus.textContent = '✗ Something went wrong. Please try emailing yui.s.wang@outlook.com directly.';
        submitBtn.textContent  = 'Send Message →';
        submitBtn.disabled     = false;
      }
    });
  </script>

</body>
</html>
